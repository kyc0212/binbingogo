<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>朋友 Bingo</title>
  <style>
    :root{
      --bg: #10294d;
      --bg-2: #173766;
      --panel: #16335d;
      --navy: #17345f;
      --navy-deep: #0d2343;
      --light-blue: #c8d9f2;
      --cream: #f6f0e4;
      --cream-2: #efe5d1;
      --gold: #d4b06a;
      --gold-soft: #c9a156;
      --wine: #8d1f32;
      --wine-2: #a9273d;
      --line: rgba(255,255,255,0.08);
      --cell-border: #d7c7a7;
      --text: #f7f3eb;
      --text-dark: #16335d;
      --muted: rgba(255,255,255,0.72);
      --shadow: 0 18px 40px rgba(5, 14, 28, 0.35);
    }

    *{
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body{
      margin: 0;
      padding: 0;
      font-family:
        "Noto Serif TC",
        "Songti TC",
        "PMingLiU",
        "MingLiU",
        serif;
      background:
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--text);
    }

    body{
      min-height: 100vh;
    }

    .page{
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 12px 10px 26px;
    }

    .app{
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(2px);
    }

    .topbar{
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(212,176,106,0.03));
    }

    .small-title{
      margin: 0;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.68);
      letter-spacing: 0.04em;
    }

    .board-area{
      padding: 18px 14px 22px;
    }

    .name-box{
      max-width: 440px;
      margin: 0 auto 18px;
      text-align: center;
    }

    .name-line{
      border-top: 2px solid rgba(255,255,255,0.2);
      padding-top: 8px;
    }

    .name-input{
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      text-align: center;
      color: var(--gold);
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 900;
      font-family: inherit;
      padding: 4px 8px;
    }

    .name-input::placeholder{
      color: rgba(255,255,255,0.28);
    }

    .topic-wrap{
      width: min(92%, 520px);
      margin: 0 auto 20px;
      text-align: center;
    }

    .topic-input{
      display: block;
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      text-align: center;
      color: var(--text);
      font-size: clamp(28px, 6vw, 40px);
      font-weight: 900;
      font-family: inherit;
      padding: 4px 10px 8px;
      line-height: 1.2;
    }

    .topic-input::placeholder{
      color: rgba(255,255,255,0.42);
    }

    .topic-underline{
      width: 100%;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent 0%, var(--gold) 12%, var(--gold-soft) 50%, var(--gold) 88%, transparent 100%);
      box-shadow: 0 0 10px rgba(212,176,106,0.28);
    }

    .board-wrap{
      position: relative;
      width: min(94vw, 620px);
      aspect-ratio: 1 / 1;
      margin: 0 auto;
    }

    .board{
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 10px;
    }

    .cell{
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid var(--cell-border);
      background: linear-gradient(180deg, var(--cream) 0%, var(--cream-2) 100%);
      transition: 0.2s ease;
      min-width: 0;
      min-height: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    }

    .cell.marked{
      background: linear-gradient(180deg, #cbb183 0%, #b89458 100%);
      border-color: var(--gold);
      box-shadow: 0 10px 22px rgba(212,176,106,0.18);
    }

    .cell-input{
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: var(--navy);
      font-family: inherit;
      font-size: clamp(16px, 2.5vw, 24px);
      font-weight: 900;
      line-height: 1.25;
      text-align: center;
      padding: 12px 10px;
      overflow-wrap: anywhere;
      word-break: break-word;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cell.marked .cell-input{
      color: var(--navy-deep);
    }

    .cell-input::placeholder{
      color: rgba(23,52,95,0.25);
    }

    .cell-toggle{
      position: absolute;
      inset: 0;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 2;
    }

    .cell.editing .cell-toggle{
      display: none;
    }

    .line-layer{
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .line{
      position: absolute;
      left: 50%;
      top: 50%;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--wine), var(--wine-2));
      transform-origin: center center;
      box-shadow: 0 4px 12px rgba(141,31,50,0.32);
    }

    .actions{
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button{
      border: none;
      border-radius: 999px;
      padding: 11px 18px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.2s ease;
    }

    button:hover{
      transform: translateY(-1px);
    }

    .btn-cream{
      background: var(--cream);
      color: var(--navy);
    }

    .btn-light{
      background: var(--light-blue);
      color: var(--navy);
    }

    .btn-wine{
      background: var(--wine);
      color: #fff;
    }

    @media (max-width: 560px){
      .page{
        padding: 8px 6px 18px;
      }

      .app{
        border-radius: 20px;
      }

      .topbar{
        padding: 12px 10px 10px;
      }

      .small-title{
        font-size: 11px;
      }

      .board-area{
        padding: 14px 10px 16px;
      }

      .board-wrap{
        width: min(96vw, 96vw);
      }

      .board{
        gap: 7px;
      }

      .cell{
        border-radius: 16px;
      }

      .cell-input{
        padding: 10px 8px;
        font-size: clamp(15px, 3.8vw, 18px);
      }

      .actions{
        gap: 8px;
      }

      button{
        padding: 10px 14px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="app">
      <div class="topbar">
        <p class="small-title">大學生沒事好無聊所以把朋友當遊戲</p>
      </div>

      <div class="board-area">
        <div class="name-box">
          <div class="name-line">
            <input
              id="nameInput"
              class="name-input"
              type="text"
              placeholder=""
              autocomplete="off"
            />
          </div>
        </div>

        <div class="topic-wrap">
          <input
            id="topicInput"
            class="topic-input"
            type="text"
            placeholder="請輸入主題"
            autocomplete="off"
          />
          <div class="topic-underline"></div>
        </div>

        <div class="board-wrap" id="boardWrap">
          <div class="board" id="board"></div>
          <div class="line-layer" id="lineLayer"></div>
        </div>

        <div class="actions">
          <button class="btn-cream" id="markModeBtn">目前：輸入模式</button>
          <button class="btn-light" id="clearMarksBtn">清除記號</button>
          <button class="btn-wine" id="clearTextBtn">清空全部內容</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const board = document.getElementById('board');
    const lineLayer = document.getElementById('lineLayer');
    const markModeBtn = document.getElementById('markModeBtn');
    const clearMarksBtn = document.getElementById('clearMarksBtn');
    const clearTextBtn = document.getElementById('clearTextBtn');

    const size = 3;
    const total = size * size;
    let markMode = false;
    let cellElements = [];

    const winningLines = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6]
    ];

    function buildBoard() {
      board.innerHTML = '';
      cellElements = [];

      for (let i = 0; i < total; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';

        const input = document.createElement('textarea');
        input.className = 'cell-input';
        input.rows = 1;
        input.placeholder = '';

        const toggle = document.createElement('button');
        toggle.className = 'cell-toggle';
        toggle.type = 'button';
        toggle.setAttribute('aria-label', `切換第 ${i + 1} 格標記`);

        toggle.addEventListener('click', () => {
          if (!markMode) {
            cell.classList.add('editing');
            input.focus();
            return;
          }
          cell.classList.toggle('marked');
          drawWinningLines();
        });

        input.addEventListener('focus', () => {
          cell.classList.add('editing');
        });

        input.addEventListener('blur', () => {
          cell.classList.remove('editing');
        });

        input.addEventListener('click', (e) => {
          if (markMode) e.stopPropagation();
        });

        cell.appendChild(input);
        cell.appendChild(toggle);
        board.appendChild(cell);
        cellElements.push(cell);
      }
    }

    function getCenter(index) {
      const row = Math.floor(index / size);
      const col = index % size;
      const unit = 100 / size;
      return {
        x: col * unit + unit / 2,
        y: row * unit + unit / 2
      };
    }

    function drawLine(startIndex, endIndex) {
      const start = getCenter(startIndex);
      const end = getCenter(endIndex);

      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const length = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      const centerX = (start.x + end.x) / 2;
      const centerY = (start.y + end.y) / 2;

      const line = document.createElement('div');
      line.className = 'line';
      line.style.width = `${length}%`;
      line.style.left = `${centerX}%`;
      line.style.top = `${centerY}%`;
      line.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;

      lineLayer.appendChild(line);
    }

    function drawWinningLines() {
      lineLayer.innerHTML = '';

      winningLines.forEach(([a, b, c]) => {
        const ok =
          cellElements[a].classList.contains('marked') &&
          cellElements[b].classList.contains('marked') &&
          cellElements[c].classList.contains('marked');

        if (ok) drawLine(a, c);
      });
    }

    function clearMarks() {
      cellElements.forEach(cell => cell.classList.remove('marked'));
      drawWinningLines();
    }

    function clearTexts() {
      document.querySelectorAll('.cell-input').forEach(input => {
        input.value = '';
      });
      document.getElementById('nameInput').value = '';
      document.getElementById('topicInput').value = '';
      clearMarks();
    }

    function updateMarkModeButton() {
      markModeBtn.textContent = markMode ? '目前：標記模式' : '目前：輸入模式';
    }

    markModeBtn.addEventListener('click', () => {
      markMode = !markMode;
      updateMarkModeButton();
    });

    clearMarksBtn.addEventListener('click', clearMarks);
    clearTextBtn.addEventListener('click', clearTexts);

    buildBoard();
    updateMarkModeButton();
  </script>
</body>
</html>
