<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>朋友 Bingo</title>
  <style>
    :root{
      --bg: #f4f1ea;
      --paper: #fcfbf7;
      --navy: #1f355e;
      --navy-2: #29457a;
      --red: #9f2430;
      --red-2: #bc3341;
      --gold: #b89b63;
      --line: #d7dce6;
      --text: #18202b;
      --muted: #6f7785;
      --cell-bg: #ffffff;
      --cell-marked: #213760;
      --cell-marked-text: #f8fbff;
      --shadow: 0 14px 34px rgba(20, 30, 48, 0.08);
      --radius: 18px;
    }

    *{
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body{
      margin: 0;
      padding: 0;
      background:
        linear-gradient(180deg, #f8f6f0 0%, #f3f0ea 100%);
      color: var(--text);
      font-family:
        "Noto Serif TC",
        "Songti TC",
        "PMingLiU",
        "MingLiU",
        serif;
    }

    body{
      min-height: 100vh;
    }

    .page{
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 14px 32px;
    }

    .app{
      background: rgba(252, 251, 247, 0.96);
      border: 1px solid rgba(31, 53, 94, 0.08);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar{
      padding: 18px 18px 14px;
      background:
        linear-gradient(135deg, rgba(31,53,94,0.06) 0%, rgba(159,36,48,0.06) 100%);
      border-bottom: 1px solid rgba(31, 53, 94, 0.08);
    }

    .small-title{
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.06em;
      margin: 0;
    }

    .board-area{
      padding: 18px 14px 20px;
    }

    .name-box{
      max-width: 420px;
      margin: 0 auto 14px;
      text-align: center;
    }

    .name-label{
      display: inline-block;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    .name-line{
      border-top: 2px solid var(--navy);
      padding-top: 8px;
    }

    .name-input{
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      text-align: center;
      color: var(--navy);
      font-size: clamp(20px, 4.6vw, 28px);
      font-weight: 700;
      font-family: inherit;
      padding: 4px 8px;
    }

    .name-input::placeholder{
      color: rgba(31,53,94,0.42);
    }

    .topic-input{
      display: block;
      width: min(92%, 500px);
      margin: 0 auto 16px;
      border: none;
      outline: none;
      background: transparent;
      text-align: center;
      color: var(--navy);
      font-size: clamp(24px, 5.2vw, 36px);
      font-weight: 700;
      font-family: inherit;
      padding: 6px 10px;
      line-height: 1.25;
    }

    .topic-input::placeholder{
      color: rgba(31,53,94,0.38);
    }

    .board-wrap{
      position: relative;
      width: min(92vw, 620px);
      aspect-ratio: 1 / 1;
      margin: 0 auto;
    }

    .board{
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 10px;
    }

    .cell{
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid rgba(31,53,94,0.12);
      background: var(--cell-bg);
      transition: 0.2s ease;
      min-width: 0;
      min-height: 0;
    }

    .cell.marked{
      background: linear-gradient(180deg, var(--navy-2), var(--navy));
      border-color: rgba(31,53,94,0.9);
      box-shadow: 0 10px 22px rgba(31,53,94,0.16);
    }

    .cell-input{
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: clamp(15px, 2.4vw, 22px);
      line-height: 1.35;
      text-align: center;
      padding: 10px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .cell.marked .cell-input{
      color: var(--cell-marked-text);
    }

    .cell-input::placeholder{
      color: rgba(24,32,43,0.28);
    }

    .cell-toggle{
      position: absolute;
      inset: 0;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 2;
    }

    .cell.editing .cell-toggle{
      display: none;
    }

    .line-layer{
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .line{
      position: absolute;
      left: 50%;
      top: 50%;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--red), var(--red-2));
      transform-origin: center center;
      box-shadow: 0 3px 10px rgba(159, 36, 48, 0.28);
    }

    .actions{
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button{
      border: none;
      border-radius: 999px;
      padding: 11px 18px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.2s ease;
    }

    button:hover{
      transform: translateY(-1px);
    }

    .btn-navy{
      background: var(--navy);
      color: #fff;
    }

    .btn-red{
      background: var(--red);
      color: #fff;
    }

    .btn-light{
      background: #e9edf4;
      color: var(--navy);
    }

    @media (max-width: 560px){
      .page{
        padding: 10px 8px 22px;
      }

      .app{
        border-radius: 18px;
      }

      .topbar{
        padding: 12px 10px 10px;
      }

      .small-title{
        font-size: 11px;
      }

      .board-area{
        padding: 14px 10px 16px;
      }

      .board-wrap{
        width: min(96vw, 96vw);
      }

      .board{
        gap: 7px;
      }

      .cell{
        border-radius: 14px;
      }

      .cell-input{
        padding: 8px 6px;
        font-size: clamp(14px, 3.7vw, 18px);
      }

      .actions{
        gap: 8px;
      }

      button{
        padding: 10px 14px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="app">
      <div class="topbar">
        <p class="small-title">大學生沒事好無聊所以把朋友當遊戲</p>
      </div>

      <div class="board-area">
        <div class="name-box">
          <div class="name-label">請輸入朋友姓名</div>
          <div class="name-line">
            <input
              id="nameInput"
              class="name-input"
              type="text"
              placeholder=""
              autocomplete="off"
            />
          </div>
        </div>

        <input
          id="topicInput"
          class="topic-input"
          type="text"
          placeholder="請輸入主題"
          autocomplete="off"
        />

        <div class="board-wrap" id="boardWrap">
          <div class="board" id="board"></div>
          <div class="line-layer" id="lineLayer"></div>
        </div>

        <div class="actions">
          <button class="btn-navy" id="markModeBtn">切換標記模式</button>
          <button class="btn-light" id="clearMarksBtn">清除記號</button>
          <button class="btn-red" id="clearTextBtn">清空全部內容</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const board = document.getElementById('board');
    const lineLayer = document.getElementById('lineLayer');
    const markModeBtn = document.getElementById('markModeBtn');
    const clearMarksBtn = document.getElementById('clearMarksBtn');
    const clearTextBtn = document.getElementById('clearTextBtn');

    const size = 3;
    const total = size * size;
    let markMode = true;
    let cellElements = [];

    const winningLines = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6]
    ];

    function buildBoard() {
      board.innerHTML = '';
      cellElements = [];

      for (let i = 0; i < total; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';

        const input = document.createElement('textarea');
        input.className = 'cell-input';
        input.placeholder = '';
        input.rows = 1;

        const toggle = document.createElement('button');
        toggle.className = 'cell-toggle';
        toggle.type = 'button';
        toggle.setAttribute('aria-label', `切換第 ${i + 1} 格標記`);

        toggle.addEventListener('click', () => {
          if (!markMode) {
            cell.classList.add('editing');
            input.focus();
            return;
          }
          cell.classList.toggle('marked');
          drawWinningLines();
        });

        input.addEventListener('focus', () => {
          cell.classList.add('editing');
        });

        input.addEventListener('blur', () => {
          cell.classList.remove('editing');
          autoResize(input);
        });

        input.addEventListener('input', () => {
          autoResize(input);
        });

        input.addEventListener('click', (e) => {
          if (markMode) {
            e.stopPropagation();
            cell.classList.add('editing');
            input.focus();
          }
        });

        cell.appendChild(input);
        cell.appendChild(toggle);
        board.appendChild(cell);
        cellElements.push(cell);

        autoResize(input);
      }
    }

    function autoResize(el) {
      el.style.height = '100%';
    }

    function getCenter(index) {
      const row = Math.floor(index / size);
      const col = index % size;
      const unit = 100 / size;
      return {
        x: col * unit + unit / 2,
        y: row * unit + unit / 2
      };
    }

    function drawLine(startIndex, endIndex) {
      const start = getCenter(startIndex);
      const end = getCenter(endIndex);

      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const length = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      const centerX = (start.x + end.x) / 2;
      const centerY = (start.y + end.y) / 2;

      const line = document.createElement('div');
      line.className = 'line';
      line.style.width = `${length}%`;
      line.style.left = `${centerX}%`;
      line.style.top = `${centerY}%`;
      line.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;

      lineLayer.appendChild(line);
    }

    function drawWinningLines() {
      lineLayer.innerHTML = '';

      winningLines.forEach(([a, b, c]) => {
        const ok =
          cellElements[a].classList.contains('marked') &&
          cellElements[b].classList.contains('marked') &&
          cellElements[c].classList.contains('marked');

        if (ok) {
          drawLine(a, c);
        }
      });
    }

    function clearMarks() {
      cellElements.forEach(cell => cell.classList.remove('marked'));
      drawWinningLines();
    }

    function clearTexts() {
      const inputs = document.querySelectorAll('.cell-input');
      inputs.forEach(input => {
        input.value = '';
      });
      clearMarks();
    }

    function updateMarkModeButton() {
      markModeBtn.textContent = markMode ? '目前：標記模式' : '目前：輸入模式';
    }

    markModeBtn.addEventListener('click', () => {
      markMode = !markMode;
      updateMarkModeButton();
    });

    clearMarksBtn.addEventListener('click', clearMarks);
    clearTextBtn.addEventListener('click', clearTexts);

    buildBoard();
    updateMarkModeButton();
  </script>
</body>
</html>
